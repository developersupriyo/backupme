<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Quick Notes</h1>
        <div>
            <button onclick="openNoteDialog()">+ ADD NOTE</button>
            <button id="themeToggleBtn">🌙</button>
        </div>
    </header>
    <main id="notesContainer">

    </main>
    <dialog id="noteDialog">
        <div>
            <div>
                <h2 id="dialogTitle">Add</h2>
                <button onclick="closeNoteDialog()">X</button>
            </div>
            <form id="noteForm">
                <div>
                    <label for="noteTitle">Title</label>
                    <input type="text" id="noteTitle" placeholder="Enter notes Title..." required>
                </div>

                <div>
                    <label for="noteContent">Content</label>
                    <input type="text" id="noteContent" placeholder="Enter notes Content..." required>
                </div>
                <div>
                    <button type="button" onclick="closeNoteDialog()">Cancel</button>
                    <button type="submit">Save Note</button>
                </div>
            </form>
        </div>
    </dialog>
</body>
</html>
