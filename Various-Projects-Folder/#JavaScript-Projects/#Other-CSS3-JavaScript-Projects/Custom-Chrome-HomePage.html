<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devmode</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{
    padding: 0;
    margin: 0;
    font-family: "Press Start 2P", serif;
    text-decoration: none;
}
.container{
    width: 100%;
    height: 100vh;
    position: relative;
    background: #000;
    position: relative;
}
.container .gmail a{
    position: absolute;
    padding: 10px 20px;
    color: green;
    border: green 1px dashed;
    border-radius: 5px;
    top: 30px;
    right: 30px;
    cursor: pointer;
}
.container .gmail a:hover{
    transform: scale(1.1,1.1);
}
.container .search{
    position: absolute;
    top: 200px;
    left: 50px;
}
.container .search input{
    background: #000;
    padding: 90px;
    width: 100%;
    color: green;
    font-size: 50px;
    border: 4px dashed gray;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="gmail">
            <a href="https://www.gmail.com"><code>Mail</code></a>
        </div>
        <marquee
                direction="down"
                width="900"
                height="600"
                behavior="alternate"
                style="border:solid">
            <marquee behavior="alternate" style="color: green;">0</marquee>
        </marquee>
<div class="search">
    <input type="text" placeholder="hack the system ...">
</div>
    </div>
</body>
</html>
