<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Element</title>
<style>
*{
    padding: 0;

}

}
.card{

    height: 200px;

    border-radius: 5px;
    cursor: move;
}

</style>
</head>
<body>
    <div class="container">
        <div class="card" style="width: 400px; "></div>
        <div class="card" style="width: px; height: px;"></div>

        <div class="card" style="width: px; height: 300px;"></div>
        <div class="card" style="width: px; height: px;"></div>
        <div class="card" style="width: 400px; height: px;"></div>
        <div class="card" style="width: 300px; height: 300px;"></div>
        <div class="card" style="width: 100px; height: 100px;"></div>
        <div class="card" style="width: 500px; height: 300px;"></div>
        <div class="card" style="width: 400px; height: 300px;"></div>
        <div class="card" style="width: px; height: px;"></div>
    </div>

</html>
