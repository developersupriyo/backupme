    <title>Diwali</title>
    <Style>
        *{
            padding: 0;
            margin: 0;
        }
        body{
            display: flex;
            background-color: #000;
            justify-content: center;
            gap: 70px;
            align-items: center;
            align-content: center;
            height: 93vh;
            flex-wrap: wrap;

        }
        .light{
            width: 40px;
            height: 40px;
            border-radius: 100%;
        }
        .light::before{
            content: '';
            position: absolute;
            border-radius: 100%;
            width: 40px;
            height: 40px;
            /* background-color: #fff; */
            animation: blnk 2s cubic-bezier(0, 0.41, 0.27, 1.02) infinite;

        }
        .light::after{
            content: '';
            position: absolute;
            border-radius: 100%;
            background-color: #fff;
            width: 45px;
            height: 45px;
            filter: blur(50px);
        }
        @keyframes blnk{
            0%{
                background-color: #ff5555;
            }
            20%{
                
            }
            30%{
                background-color: #000;
            }
            40%{
                background-color: darkmagenta;
            }
            50%{
                background-color: rgb(255, 255, 255);
            }
            60%{
                background-color: yellow;
            }
            70%{
                
            }
            80%{
                background-color: rgb(0, 213, 255);
            }
            90%{
                background-color: blue;
            }
            100%{
                background-color: red;
            }

        }
    </Style>
</head>
