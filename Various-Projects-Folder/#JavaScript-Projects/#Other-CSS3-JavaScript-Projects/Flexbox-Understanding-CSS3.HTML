<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            width: 100%;
            height: 92vh; 
            /* border: 1px solid #000; */
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: rgb(159, 55, 250);
            color: #fff;
            border-radius: 9px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 30px;
            display: grid;
            place-content: center;
            transition: 0.5s;
            cursor: pointer;
        }
        ::selection{
            color: rgb(159, 55, 250);
            background-color: #fff;
        }
        .box:hover{
            font-size: 35px;
            width: 125px;
            height: 125px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
        
    </div>
</body>
</html>
