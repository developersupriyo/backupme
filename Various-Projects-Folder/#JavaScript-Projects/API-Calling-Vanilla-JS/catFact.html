<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatFact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Protest+Strike&display=swap');
        *{
            font-family:poppins;
        }
        body{
            height: 80vh;
            background-color: #ceff1c;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .container{
            width: 90vh;
            height: 40vh;
            background: #fff;
            padding: 40px;
            border-radius: 13px;
            position: relative;
        }
        #catfacts{
            margin-bottom: 20px;
            text-align: center;
        }
        .container::after{
            content: 'JS Api project';
            position: absolute;
            background: #ffe204;
            padding: 5px 14px;
            width: 100px;
            font-size: 13px;
            border-radius: 2px;
            transform: rotate(-30deg);
            left: 0;
            top: 0;
        }
        #search{
            padding: 10px 30px;
            border-radius: 13px;
            background: #ceff1c;
            border: #fff solid;
            color: #616161;
            font-weight: 700;
            cursor: pointer;
            position: absolute;
            bottom: 30px;
            right: 40px;
        }
        .note{
            position: absolute;
            bottom: 10px;
            color: #616161;
            font-weight: 500;
            width: 500px;
        }
    </style>
</head>
<body>
    <div class="container">
   <h1 id="catfacts">Loading...</h1>
   <h6 class="note"><i class="fa-solid fa-circle-info"></i> This is a JavaScript Api based Project. Which generates random Cats related Facts. Developed by smalakar</h6>
   <button id="search">Generate New</button>
</div>
   <script src="catFact.js"></script>
</body>
</html>
