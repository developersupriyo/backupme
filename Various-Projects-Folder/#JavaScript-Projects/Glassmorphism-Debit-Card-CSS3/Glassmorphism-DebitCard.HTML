<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism-Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap');
        </style>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
*{
    padding: 0;
    margin: 0;
    text-decoration: none;
}
.container{
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    align-content: center;
    flex-wrap: wrap;
    background-image: linear-gradient(#FAB12F,#cb12f9);
}
.c1{
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle at 50px 50px,#fff,#0D92F4,#0D92F4, #8c0df4);
    position: absolute;
    top: 161px;
    left: 331px;
}
.c2{
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background-color: #FAB12F;
    background: radial-gradient(circle at 100px 100px, #FAB12F,#FAB12F,#f8ca42,#FAB12F);
    position: absolute;
    top: 410px;
    right: 290px;
}
.card{
    width: 596px;
    height: 336px;
    background-color: #ffffff76;
    backdrop-filter: blur(10px);
    position: absolute;
    border-radius: 13px;
    border: 2px solid #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    color: #fff;
    font-size: 34px;
    position: relative;
    font-family: "poppins",Verdana, Geneva, Tahoma, sans-serif;
    font-weight: 500;
    transition-delay: 0.4s;
    transition: 2s;
}
.card:hover{
    transform: rotateY(360deg);
}
::selection{
    background-color: #ffffff00;
}
p{
    position: absolute;
}
.logo{
    top: 50px;
    left: 50px;
    font-size: 43px;
}
.bankName{
    top: 40px;
    right: 40px;
}
.number{
    font-family: "JetBrains Mono", monospace;
    bottom: 100px;
    left: 30px;
    font-weight: 400;
}
.name{
    bottom: 40px;
    left: 30px;
}
.chipLogo{
    position: absolute;
    top: 140px;
    right: 71px;
    width: 55px;
}
@media  (max-width: 616px) {
    .card{
        width: 477px;
        height: 291px;
        font-size: 24px;
        }
        .logo{
            font-size: 25px;
        }
        .chipLogo{
            top: 117px;
            right: 66px;
            width: 38px;
        }   
}
@media (max-width: 400px){
    .c1{
        width: 200px;
        height:200px;
        top: 249px;
        left: 172px;
    }
    .c2{
        top: 419px;
        right: 164px;
    }
    .card{
        height: 208px;
        width: 306px;
        font-size: 15px;
    }
    .number{
        bottom:68px;
    }
    .chipLogo{
        right: 35px;
    top: 82px;
    width: 30px;
    }
    .bankName {
    top: 32px;
    right: 23px;
}
.logo {
    top: 35px;
    left: 35px;
}
}
</style>
</head>
<body>
    <div class="container" id="ColorChange" onclick="colorChange()">
        <div class="c1" id="epd" onclick="expand()"></div>
        <div class="c2" id="epd2" onclick="expand2()"></div>
        <div class="card">
            <p class="logo"><i class="fa-brands fa-slack"></i></p>
            <p class="bankName">DeVeloper Bank</p>
        <img src="chipLogo.png" class="chipLogo">
            <p class="number">6XXX 6XX6 6X6X 6XX6</p>
            <p class="name">Supriyo Malakar</p>
        </div>
    </div>
<script>
function expand(){
    document.getElementById("epd").style.width= "300px";
    document.getElementById("epd").style.height= "300px";
}
function expand2(){
    document.getElementById("epd2").style.width= "400px";
    document.getElementById("epd2").style.height= "400px";
}
function colorChange(){
    document.getElementById("ColorChange").style.backgroundImage= "linear-gradient(#cb12f9,#FAB12F)";

}

</script>
    
</body>
</html>
