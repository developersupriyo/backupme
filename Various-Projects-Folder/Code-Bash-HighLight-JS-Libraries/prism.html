<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="prism.css">
    <title>codeCopy</title>
    
</head>
<body>
    <div class="code1">
        <input type="text" value="@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Protest+Strike&display=swap');
        " id="myInput" >
        <button onclick="myFunction();changeLabel();"  class="cpy"><i class="fa-regular fa-copy"></i> CODE</button>
</div>

    <script>
        function myFunction() {
  // Get the text field
  var copyText = document.getElementById("myInput");

  // Select the text field
  copyText.select();
  copyText.setSelectionRange(0, 99999); // For mobile devices

   // Copy the text inside the text field
  navigator.clipboard.writeText(copyText.value);}

  // To change the button text after Clicked
  function changeLabel(){
            const button = 
                document.querySelector('button');
            button.innerHTML = 'COPIED <i class="fa-solid fa-check-double"></i>';
            button.style.right='100px';
        }
</script>
</body>
</html>
